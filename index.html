<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalição de P1 - Baião</title>
    <link rel="stylesheet" href="script.js">
    <link rel="stylesheet" href="style.css">
</head>
<!-- Criando o cabeçalho-->
<h1>✅🥷✅--Quadro Kanban--✅☠️✅</h1>

<body>
    <!--Criando a caixa para digitar a tarefa-->
    <div class="inCard">
        <input type="text" name="box" id="inBox" placeholder="Digite a Tarefa">
        <button onclick="addcard">Adicionar</button>
    </div>

    <!--Criando as colunas para receberem os dados-->
    <div class="Colunas">
        <div class="coluna" id="col01" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>A Realizar! 🧐</h2>
        </div>
        <div class="coluna" id="col02" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>Realizando! 💻</h2>
        </div>
        <div class="coluna" id="col03" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>Realizado! 🗄️</h2>
        </div>
    </div>
    
   
   
   
    
</body>
</html>
